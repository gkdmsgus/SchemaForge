<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchemaForge</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ SchemaForge</h1>
      <p class="subtitle">자연어로 KiCad 스키매틱을 자동 생성합니다</p>
    </header>

    <main>
      <div class="input-section">
        <label for="description">회로 설명</label>
        <textarea id="description"
          placeholder="예: 5V 입력받아서 LED 3개 깜빡이는 회로&#10;예: 베이스 앰프 회로&#10;예: USB-C로 리튬배터리 충전하는 회로"
          rows="4"></textarea>
        <div class="examples">
          <span>예시:</span>
          <button class="example-btn" onclick="setExample(this)">LED 점멸 회로</button>
          <button class="example-btn" onclick="setExample(this)">베이스 앰프 회로</button>
          <button class="example-btn" onclick="setExample(this)">USB-C 배터리 충전</button>
        </div>
        <button id="generate-btn" onclick="generate()">스키매틱 생성 <span class="shortcut">Ctrl+Enter</span></button>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="result-section" class="result-section hidden">
        <div class="result-header">
          <h2>회로 구성도</h2>
          <button id="download-btn" onclick="downloadNet()">⬇ KiCad .net 다운로드</button>
        </div>
        <div class="canvas-wrap">
          <canvas id="circuit-canvas"></canvas>
        </div>

        <!-- 참고 출처 -->
        <div id="sources-section" class="sources-section hidden">
          <h2>🔍 참고한 레퍼런스</h2>
          <div id="sources-list"></div>
        </div>

        <!-- BOM 테이블 -->
        <div id="bom-section" class="bom-section hidden">
          <h2>필요한 부품 (BOM)</h2>
          <div id="bom-table-wrap"></div>
        </div>

        <div id="guide-section" class="guide-section hidden">
          <h2>배선 가이드</h2>
          <div id="guide-content" class="guide-content"></div>
        </div>

        <details class="code-details">
          <summary>생성된 skidl 코드 보기</summary>
          <pre id="code-content"></pre>
        </details>
      </div>
    </main>
  </div>

<script>
let currentFilename = null;

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("description").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) generate();
  });
});

function setExample(btn) { document.getElementById("description").value = btn.textContent; }

async function generate() {
  const description = document.getElementById("description").value.trim();
  if (!description) { showStatus("회로 설명을 입력하세요.", "error"); return; }
  const btn = document.getElementById("generate-btn");
  btn.disabled = true; btn.textContent = "생성 중...";
  showStatus("GPT-4o가 회로를 분석하고 있습니다...", "loading");
  document.getElementById("result-section").classList.add("hidden");
  try {
    const res = await fetch("/generate", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({description}),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const parts = buf.split("\n\n");
      buf = parts.pop();
      for (const part of parts) {
        const evtMatch  = part.match(/^event: (.+)$/m);
        const dataMatch = part.match(/^data: ([\s\S]+)$/m);
        if (!evtMatch || !dataMatch) continue;
        const evt  = evtMatch[1].trim();
        const data = dataMatch[1].trim();

        if (evt === "status") {
          showStatus(data, "loading");
        } else if (evt === "error") {
          let msg = data;
          try { msg = JSON.parse(data).message || data; } catch(_){}
          showStatus(`❌ ${msg}`, "error");
          return;
        } else if (evt === "done") {
          const d = JSON.parse(data);
          currentFilename = d.filename;
          document.getElementById("code-content").textContent = d.code;
          document.getElementById("result-section").classList.remove("hidden");
          showStatus("✅ 생성 완료!", "success");
          drawSchematic(d.graph);
          renderBOM(d.graph.components, d.guide);
          renderGuide(d.guide);
          renderSources(d.sources);
        }
      }
    }
  } catch(e) {
    showStatus(`❌ 네트워크 오류: ${e.message}`, "error");
  } finally {
    btn.disabled = false; btn.textContent = "스키매틱 생성";
  }
}

function downloadNet() { if (currentFilename) window.location.href = `/download/${currentFilename}`; }

// ─── 참고 출처 ──────────────────────────────────────────────────────────
function renderSources(sources) {
  const section = document.getElementById("sources-section");
  const list    = document.getElementById("sources-list");
  if (!sources || !sources.length) { section.classList.add("hidden"); return; }
  list.innerHTML = sources.map(url =>
    `<a class="source-link" href="${url}" target="_blank" rel="noopener">${url}</a>`
  ).join("");
  section.classList.remove("hidden");
}

// ─── BOM 테이블 ─────────────────────────────────────────────────────────
const COMP_NAMES = {
  R:'저항', C:'캐패시터', Q:'트랜지스터', D:'다이오드/LED',
  L:'인덕터', U:'IC/칩', Y:'크리스탈', SW:'스위치', J:'커넥터',
};
const COMP_UNITS = { R:'Ω', C:'F', L:'H' };

function renderBOM(components, guide) {
  const section = document.getElementById("bom-section");
  const wrap    = document.getElementById("bom-table-wrap");
  if (!components || !components.length) { section.classList.add("hidden"); return; }

  // 가이드에서 각 부품 역할 추출 (예: "R1 - 저항 10kΩ: 바이어스 역할")
  const roles = {};
  if (guide) {
    guide.split('\n').forEach(line => {
      const m = line.match(/^-\s+([A-Z]\d+)[^:]*:\s*(.+)/);
      if (m) roles[m[1]] = m[2].trim();
    });
  }

  // 타입별 그룹화 & 카운트
  const groups = {};
  components.forEach(c => {
    const type = c.ref.replace(/\d+/g,'');
    if (!groups[type]) groups[type] = [];
    groups[type].push(c);
  });

  let html = `<table class="bom-table">
    <thead><tr>
      <th>#</th><th>부품번호</th><th>종류</th><th>값</th><th>수량</th><th>역할</th>
    </tr></thead><tbody>`;

  let idx = 1;
  Object.entries(groups).forEach(([type, items]) => {
    items.forEach(c => {
      const name = COMP_NAMES[type] || type;
      const role = roles[c.ref] || '-';
      html += `<tr>
        <td>${idx++}</td>
        <td><span class="bom-ref" style="color:${getCompColor(c.ref)}">${c.ref}</span></td>
        <td>${name}</td>
        <td class="bom-val">${c.value || '-'}</td>
        <td>1</td>
        <td class="bom-role">${role}</td>
      </tr>`;
    });
  });

  html += `</tbody><tfoot><tr>
    <td colspan="4" style="color:#666;font-size:0.8rem;padding-top:8px">총 부품 수</td>
    <td><strong>${components.length}</strong></td><td></td>
  </tr></tfoot></table>`;

  wrap.innerHTML = html;
  section.classList.remove("hidden");
}

// ─── 배선 가이드 렌더링 ─────────────────────────────────────────────────
function renderGuide(guide) {
  const section = document.getElementById("guide-section");
  const content = document.getElementById("guide-content");
  if (!guide) { section.classList.add("hidden"); return; }
  const html = guide
    .replace(/\[부품 목록\]/g, '<h3 class="guide-heading">📦 부품 목록</h3>')
    .replace(/\[배선 순서\]/g, '<h3 class="guide-heading">🔧 배선 순서</h3>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<div class="step"><span class="step-num">$1</span><span>$2</span></div>')
    .replace(/(<li>.*<\/li>\n?)+/gs, m => `<ul>${m}</ul>`);
  content.innerHTML = html;
  section.classList.remove("hidden");
}

function showStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent = msg; el.className = `status ${type}`; el.classList.remove("hidden");
}

// ─── 회로 심볼 스키매틱 렌더러 ─────────────────────────────────────────
const COLORS = {
  wire: "#7c6af5", vcc: "#f57a7a", gnd: "#7ab8f5",
  comp: "#1e2135", compBorder: "#3a3d5a",
  text: "#e0e0e0", subtext: "#888", label: "#f5c26a",
  R:"#f5c26a", C:"#7ab8f5", Q:"#5adf8a", D:"#f57a7a", L:"#c47af5", U:"#7c6af5",
};
const NET_COLORS = ["#7c6af5","#5adf8a","#f5c26a","#f57a7a","#7ab8f5","#c47af5","#f5a07a"];

// 컴포넌트 타입별 핀 수 & 위치 정의 (상대좌표, 컴포넌트 중심 기준)
// 각 핀: {id, x, y, side}
const PIN_SPACING = 20;

function getPinLayout(ref, pinCount) {
  const t = ref[0].toUpperCase();
  if (t === 'Q') {
    // 트랜지스터: B(왼쪽), C(위), E(아래)
    return { w:60, h:70, pins: {1:{x:-30,y:0,side:'L'}, 2:{x:0,y:-35,side:'T'}, 3:{x:0,y:35,side:'B'}} };
  }
  if (pinCount <= 2) {
    // 2핀 부품: 왼/오
    return { w:60, h:40, pins: {1:{x:-30,y:0,side:'L'}, 2:{x:30,y:0,side:'R'}} };
  }
  // 멀티핀 IC: 좌우 분배
  const leftCount = Math.ceil(pinCount/2), rightCount = Math.floor(pinCount/2);
  const h = Math.max(60, Math.max(leftCount, rightCount) * PIN_SPACING + 20);
  const pins = {};
  for (let i=0; i<leftCount; i++)  pins[i+1]          = {x:-40, y:-h/2+20+i*PIN_SPACING, side:'L'};
  for (let i=0; i<rightCount; i++) pins[leftCount+i+1] = {x:40,  y:-h/2+20+i*PIN_SPACING, side:'R'};
  return { w:80, h, pins };
}

// 각 컴포넌트의 심볼 그리기
function drawSymbol(ctx, ref, value, cx, cy, layout) {
  const t = ref[0].toUpperCase();
  ctx.save();
  ctx.translate(cx, cy);

  // 외부 박스 (IC 제외한 단순 부품도 배경)
  ctx.fillStyle = COLORS.comp;
  ctx.strokeStyle = COLORS[t] || COLORS.compBorder;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-layout.w/2, -layout.h/2, layout.w, layout.h, 6);
  ctx.fill(); ctx.stroke();

  // 심볼 그리기
  ctx.strokeStyle = COLORS[t] || "#aaa";
  ctx.lineWidth = 2;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  if (t === 'R') drawResistor(ctx);
  else if (t === 'C') drawCapacitor(ctx);
  else if (t === 'D') drawDiode(ctx, ref.startsWith('D'));
  else if (t === 'Q') drawTransistor(ctx);
  else if (t === 'L') drawInductor(ctx);
  else drawGenericIC(ctx, layout);

  // 핀 연결 스텁
  ctx.strokeStyle = "#555";
  ctx.lineWidth = 1.5;
  Object.values(layout.pins).forEach(p => {
    const stubLen = 10;
    ctx.beginPath();
    if (p.side==='L') { ctx.moveTo(-layout.w/2, p.y); ctx.lineTo(-layout.w/2-stubLen, p.y); }
    else if (p.side==='R') { ctx.moveTo(layout.w/2, p.y); ctx.lineTo(layout.w/2+stubLen, p.y); }
    else if (p.side==='T') { ctx.moveTo(p.x, -layout.h/2); ctx.lineTo(p.x, -layout.h/2-stubLen); }
    else if (p.side==='B') { ctx.moveTo(p.x, layout.h/2); ctx.lineTo(p.x, layout.h/2+stubLen); }
    ctx.stroke();
  });

  // ref 텍스트
  ctx.fillStyle = COLORS.text;
  ctx.font = "bold 12px monospace";
  ctx.textAlign = "center";
  ctx.fillText(ref, 0, -layout.h/2 - 14);
  // value 텍스트
  ctx.fillStyle = COLORS.subtext;
  ctx.font = "11px monospace";
  ctx.fillText(value, 0, layout.h/2 + 14);
  ctx.restore();
}

function drawResistor(ctx) {
  // 지그재그
  const pts = [-20,-16,-12,0,12,16,20].map((x,i)=>({x, y: i===0||i===6?0:i%2===1?-8:8}));
  // 왼쪽 리드
  ctx.beginPath(); ctx.moveTo(-25,0); ctx.lineTo(-20,0); ctx.stroke();
  // 지그재그
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y)); ctx.stroke();
  // 오른쪽 리드
  ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(25,0); ctx.stroke();
}

function drawCapacitor(ctx) {
  ctx.beginPath(); ctx.moveTo(-22,0); ctx.lineTo(-5,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-5,-14); ctx.lineTo(-5,14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,-14); ctx.lineTo(5,14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,0); ctx.lineTo(22,0); ctx.stroke();
}

function drawDiode(ctx, isLED) {
  // 삼각형
  ctx.beginPath();
  ctx.moveTo(-12,0); ctx.lineTo(12,0); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-10,10); ctx.lineTo(10,0); ctx.lineTo(-10,-10); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,-10); ctx.lineTo(10,10); ctx.stroke();
  if (isLED) {
    // 화살표 (빛)
    ctx.beginPath(); ctx.moveTo(14,-10); ctx.lineTo(20,-16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(18,-8); ctx.lineTo(24,-14); ctx.stroke();
  }
}

function drawTransistor(ctx) {
  // 베이스 수직선
  ctx.beginPath(); ctx.moveTo(-10,-20); ctx.lineTo(-10,20); ctx.stroke();
  // 베이스 연결
  ctx.beginPath(); ctx.moveTo(-25,0); ctx.lineTo(-10,0); ctx.stroke();
  // 컬렉터
  ctx.beginPath(); ctx.moveTo(-10,-10); ctx.lineTo(0,-10); ctx.lineTo(0,-30); ctx.stroke();
  // 이미터 (화살표)
  ctx.beginPath(); ctx.moveTo(-10,10); ctx.lineTo(0,10); ctx.lineTo(0,30); ctx.stroke();
  // 이미터 화살표
  ctx.beginPath(); ctx.moveTo(-4,22); ctx.lineTo(0,30); ctx.lineTo(4,22); ctx.stroke();
}

function drawInductor(ctx) {
  ctx.beginPath(); ctx.moveTo(-25,0); ctx.lineTo(-22,0);
  for (let i=0;i<4;i++) {
    const x = -20+i*10;
    ctx.arc(x+5, 0, 5, Math.PI, 0, false);
  }
  ctx.lineTo(25,0); ctx.stroke();
}

function drawGenericIC(ctx, layout) {
  // IC는 박스만 (이미 외부에서 그림)
  ctx.fillStyle = "#333";
  ctx.font = "10px monospace";
  ctx.textAlign = "center";
  ctx.fillText("IC", 0, 4);
}

// ─── 메인 스키매틱 그리기 ──────────────────────────────────────────────
function drawSchematic(graph) {
  const canvas = document.getElementById("circuit-canvas");
  const ctx = canvas.getContext("2d");
  const comps = graph.components || [];
  const nets  = graph.nets  || [];
  if (!comps.length) return;

  // 각 컴포넌트의 레이아웃 계산
  const layouts = {};
  comps.forEach(c => {
    const pinCount = getMaxPin(c.ref, nets);
    layouts[c.ref] = getPinLayout(c.ref, pinCount);
  });

  // 그리드 배치
  const cols = Math.min(Math.ceil(Math.sqrt(comps.length)), 4);
  const HGAP = 100, VGAP = 100, MARGIN = 70;
  const colWidths = Array(cols).fill(0);
  const rowHeights = [];
  comps.forEach((c, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    colWidths[col] = Math.max(colWidths[col], layouts[c.ref].w + HGAP);
    if (!rowHeights[row]) rowHeights[row] = 0;
    rowHeights[row] = Math.max(rowHeights[row], layouts[c.ref].h + VGAP);
  });

  // 컴포넌트 중심 위치
  const pos = {};
  let cx = MARGIN;
  for (let col = 0; col < cols; col++) {
    let cy = MARGIN + 20;
    const rowCount = Math.ceil(comps.length / cols);
    for (let row = 0; row < rowCount; row++) {
      const idx = row * cols + col;
      if (idx >= comps.length) continue;
      const c = comps[idx];
      pos[c.ref] = { x: cx + colWidths[col]/2, y: cy + rowHeights[row]/2 };
      cy += rowHeights[row];
    }
    cx += colWidths[col];
  }

  // 핀 절대좌표 계산
  function pinAbs(ref, pinId) {
    const p = pos[ref], layout = layouts[ref];
    if (!p || !layout) return null;
    const pin = layout.pins[pinId] || layout.pins[Object.keys(layout.pins)[0]];
    const stubLen = 10;
    if (pin.side==='L') return { x: p.x - layout.w/2 - stubLen, y: p.y + pin.y };
    if (pin.side==='R') return { x: p.x + layout.w/2 + stubLen, y: p.y + pin.y };
    if (pin.side==='T') return { x: p.x + pin.x, y: p.y - layout.h/2 - stubLen };
    if (pin.side==='B') return { x: p.x + pin.x, y: p.y + layout.h/2 + stubLen };
    return { x: p.x + pin.x, y: p.y + pin.y };
  }

  // 캔버스 크기
  const totalW = cx + MARGIN;
  const totalH = Object.values(pos).reduce((m,p) => Math.max(m, p.y), 0) + MARGIN + 60 + nets.length * 22;
  canvas.width  = Math.max(totalW, 500);
  canvas.height = Math.max(totalH, 300);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#0f1117";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── 와이어 그리기 ───────────────────────────────────────────────
  nets.forEach((net, ni) => {
    const isPwr = net.name === 'VCC' || net.name === 'GND';
    const color = isPwr
      ? (net.name === 'VCC' ? COLORS.vcc : COLORS.gnd)
      : NET_COLORS[ni % NET_COLORS.length];

    ctx.strokeStyle = color;
    ctx.lineWidth = isPwr ? 2.5 : 1.8;
    ctx.setLineDash([]);

    // 모든 핀 끝점 수집
    const pts = net.nodes
      .map(n => pinAbs(n.ref, n.pin))
      .filter(Boolean);

    if (pts.length < 2) {
      // 단일 핀이면 전원 심볼만
      if (pts.length === 1) drawPowerSymbol(ctx, pts[0], net.name, color);
      return;
    }

    // 첫 번째 노드 → 나머지 노드로 L자형 와이어
    for (let i = 1; i < pts.length; i++) {
      const a = pts[0], b = pts[i];
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(a.x, b.y);  // 수직
      ctx.lineTo(b.x, b.y);  // 수평
      ctx.stroke();

      // 연결점 도트
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(a.x, b.y, 3, 0, Math.PI*2); ctx.fill();
    }

    // VCC/GND 심볼
    if (net.name === 'VCC' || net.name === 'GND') {
      pts.forEach(p => drawPowerSymbol(ctx, p, net.name, color));
    }

    // 네트 라벨 (중간 와이어 위에)
    if (!isPwr && pts.length >= 2) {
      const mx = (pts[0].x + pts[pts.length-1].x) / 2;
      const my = (pts[0].y + pts[pts.length-1].y) / 2 - 8;
      ctx.fillStyle = COLORS.label;
      ctx.font = "10px monospace";
      ctx.textAlign = "left";
      ctx.fillText(net.name, mx + 4, my);
    }
  });

  // ── 컴포넌트 심볼 그리기 ─────────────────────────────────────────
  comps.forEach(c => {
    drawSymbol(ctx, c.ref, c.value, pos[c.ref].x, pos[c.ref].y, layouts[c.ref]);
  });

  // ── 네트 범례 ───────────────────────────────────────────────────
  const legendY = canvas.height - nets.length * 22 - 10;
  ctx.fillStyle = "#444";
  ctx.font = "11px monospace";
  ctx.textAlign = "left";
  ctx.fillText("── 네트 연결", MARGIN, legendY);
  nets.forEach((net, ni) => {
    const isPwr = net.name === 'VCC' || net.name === 'GND';
    const color = isPwr
      ? (net.name === 'VCC' ? COLORS.vcc : COLORS.gnd)
      : NET_COLORS[ni % NET_COLORS.length];
    const ly = legendY + 18 + ni * 20;
    ctx.fillStyle = color;
    ctx.fillRect(MARGIN, ly - 3, 18, 3);
    ctx.fillStyle = "#bbb";
    ctx.font = "11px monospace";
    const refs = [...new Set(net.nodes.map(n=>n.ref))].join(", ");
    ctx.fillText(`${net.name}  →  ${refs}`, MARGIN + 26, ly);
  });
}

function drawPowerSymbol(ctx, pt, name, color) {
  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = 2;
  if (name === 'VCC') {
    ctx.beginPath(); ctx.moveTo(pt.x, pt.y); ctx.lineTo(pt.x, pt.y - 16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pt.x-12, pt.y-16); ctx.lineTo(pt.x+12, pt.y-16); ctx.stroke();
    ctx.font = "bold 10px monospace"; ctx.textAlign = "center";
    ctx.fillText("VCC", pt.x, pt.y - 22);
  } else {
    ctx.beginPath(); ctx.moveTo(pt.x, pt.y); ctx.lineTo(pt.x, pt.y + 10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pt.x-10, pt.y+10); ctx.lineTo(pt.x+10, pt.y+10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pt.x-6,  pt.y+15); ctx.lineTo(pt.x+6,  pt.y+15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pt.x-2,  pt.y+20); ctx.lineTo(pt.x+2,  pt.y+20); ctx.stroke();
  }
}

function getMaxPin(ref, nets) {
  let max = 2;
  nets.forEach(net => net.nodes.forEach(n => {
    if (n.ref === ref) max = Math.max(max, parseInt(n.pin) || 2);
  }));
  return max;
}
