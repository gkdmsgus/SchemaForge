<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchemaForge</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ SchemaForge</h1>
      <p class="subtitle">자연어로 KiCad 스키매틱을 자동 생성합니다</p>
    </header>

    <main>
      <div class="input-section">
        <label for="description">회로 설명</label>
        <textarea
          id="description"
          placeholder="예: 5V 입력받아서 LED 3개 깜빡이는 회로&#10;예: 아두이노 나노에 온도센서 연결하는 회로&#10;예: USB-C로 리튬배터리 충전하는 회로"
          rows="5"
        ></textarea>

        <div class="examples">
          <span>예시:</span>
          <button class="example-btn" onclick="setExample(this)">LED 3개 점멸 회로</button>
          <button class="example-btn" onclick="setExample(this)">아두이노 + 온도센서</button>
          <button class="example-btn" onclick="setExample(this)">USB-C 배터리 충전</button>
        </div>

        <button id="generate-btn" onclick="generate()">스키매틱 생성</button>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="code-preview" class="code-preview hidden">
        <h3>생성된 skidl 코드</h3>
        <pre id="code-content"></pre>
      </div>
    </main>
  </div>

  <script>
    function setExample(btn) {
      document.getElementById("description").value = btn.textContent;
    }

    async function generate() {
      const description = document.getElementById("description").value.trim();
      if (!description) {
        showStatus("회로 설명을 입력하세요.", "error");
        return;
      }

      const btn = document.getElementById("generate-btn");
      btn.disabled = true;
      btn.textContent = "생성 중...";
      showStatus("GPT-4o가 회로를 분석하고 있습니다...", "loading");
      document.getElementById("code-preview").classList.add("hidden");

      try {
        const response = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ description }),
        });

        if (response.ok) {
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "schematic.net";
          a.click();
          URL.revokeObjectURL(url);
          showStatus("✅ 스키매틱 생성 완료! 파일이 다운로드됩니다.", "success");
        } else {
          const data = await response.json();
          showStatus(`❌ 오류: ${data.error}`, "error");
          if (data.code) {
            document.getElementById("code-content").textContent = data.code;
            document.getElementById("code-preview").classList.remove("hidden");
          }
          if (data.detail) {
            document.getElementById("code-content").textContent =
              (data.code || "") + "\n\n--- 오류 메시지 ---\n" + data.detail;
            document.getElementById("code-preview").classList.remove("hidden");
          }
        }
      } catch (err) {
        showStatus(`❌ 네트워크 오류: ${err.message}`, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "스키매틱 생성";
      }
    }

    function showStatus(message, type) {
      const el = document.getElementById("status");
      el.textContent = message;
      el.className = `status ${type}`;
      el.classList.remove("hidden");
    }
  </script>
</body>
</html>
