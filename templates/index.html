<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchemaForge</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ SchemaForge</h1>
      <p class="subtitle">자연어로 KiCad 스키매틱을 자동 생성합니다</p>
    </header>

    <main>
      <div class="input-section">
        <label for="description">회로 설명</label>
        <textarea id="description"
          placeholder="예: 5V 입력받아서 LED 3개 깜빡이는 회로&#10;예: 아두이노 나노에 온도센서 연결하는 회로&#10;예: 베이스 앰프 회로"
          rows="4"></textarea>
        <div class="examples">
          <span>예시:</span>
          <button class="example-btn" onclick="setExample(this)">LED 3개 점멸 회로</button>
          <button class="example-btn" onclick="setExample(this)">베이스 앰프 회로</button>
          <button class="example-btn" onclick="setExample(this)">USB-C 배터리 충전</button>
        </div>
        <button id="generate-btn" onclick="generate()">스키매틱 생성</button>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="result-section" class="result-section hidden">

        <!-- 상단: 시각화 + 다운로드 -->
        <div class="result-header">
          <h2>회로 구성도</h2>
          <button id="download-btn" onclick="downloadNet()">⬇ KiCad .net 다운로드</button>
        </div>
        <canvas id="circuit-canvas"></canvas>

        <!-- 배선 가이드 -->
        <div id="guide-section" class="guide-section hidden">
          <h2>배선 가이드</h2>
          <div id="guide-content" class="guide-content"></div>
        </div>

        <!-- skidl 코드 (접기) -->
        <details class="code-details">
          <summary>생성된 skidl 코드 보기</summary>
          <pre id="code-content"></pre>
        </details>
      </div>
    </main>
  </div>

  <script>
    let currentFilename = null;

    function setExample(btn) {
      document.getElementById("description").value = btn.textContent;
    }

    async function generate() {
      const description = document.getElementById("description").value.trim();
      if (!description) { showStatus("회로 설명을 입력하세요.", "error"); return; }

      const btn = document.getElementById("generate-btn");
      btn.disabled = true;
      btn.textContent = "생성 중...";
      showStatus("GPT-4o가 회로를 분석하고 있습니다...", "loading");
      document.getElementById("result-section").classList.add("hidden");

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ description }),
        });
        const data = await res.json();

        if (!res.ok) {
          showStatus(`❌ 오류: ${data.error}`, "error");
          if (data.code) {
            document.getElementById("code-content").textContent =
              data.code + (data.detail ? "\n\n--- 오류 ---\n" + data.detail : "");
            document.getElementById("result-section").classList.remove("hidden");
          }
          return;
        }

        currentFilename = data.filename;
        document.getElementById("code-content").textContent = data.code;
        document.getElementById("result-section").classList.remove("hidden");
        showStatus("✅ 생성 완료!", "success");

        drawCircuit(data.graph);
        renderGuide(data.guide);

      } catch (err) {
        showStatus(`❌ 네트워크 오류: ${err.message}`, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "스키매틱 생성";
      }
    }

    function downloadNet() {
      if (currentFilename) window.location.href = `/download/${currentFilename}`;
    }

    // ── 배선 가이드 렌더링 ──────────────────────────────────────────
    function renderGuide(guide) {
      const section = document.getElementById("guide-section");
      const content = document.getElementById("guide-content");
      if (!guide) { section.classList.add("hidden"); return; }

      // [부품 목록]과 [배선 순서] 섹션 파싱
      const html = guide
        .replace(/\[부품 목록\]/g, '<h3 class="guide-heading">📦 부품 목록</h3>')
        .replace(/\[배선 순서\]/g, '<h3 class="guide-heading">🔧 배선 순서</h3>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/^(\d+)\. (.+)$/gm, '<div class="step"><span class="step-num">$1</span><span>$2</span></div>')
        .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

      content.innerHTML = html;
      section.classList.remove("hidden");
    }

    // ── 회로 시각화 ─────────────────────────────────────────────────
    const NET_COLORS = ["#7c6af5","#5adf8a","#f5c26a","#f57a7a","#7ab8f5","#f5a07a","#c47af5"];

    function drawCircuit(graph) {
      const canvas = document.getElementById("circuit-canvas");
      const ctx = canvas.getContext("2d");
      const comps = graph.components || [];
      const nets = graph.nets || [];
      if (!comps.length) return;

      const CW = 110, CH = 60, HGAP = 60, VGAP = 50;
      const cols = Math.min(Math.ceil(Math.sqrt(comps.length)), 4);
      const rows = Math.ceil(comps.length / cols);
      const W = cols * (CW + HGAP) + HGAP;
      const H = rows * (CH + VGAP) + VGAP + nets.length * 26 + 60;

      canvas.width = Math.max(W, 500);
      canvas.height = H;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 컴포넌트 중심 위치 계산
      const pos = {};
      comps.forEach((c, i) => {
        const col = i % cols, row = Math.floor(i / cols);
        pos[c.ref] = {
          x: HGAP + col * (CW + HGAP) + CW / 2,
          y: VGAP + row * (CH + VGAP) + CH / 2,
        };
      });

      // 연결선 그리기 (컴포넌트 박스 아래 레이어)
      nets.forEach((net, ni) => {
        const color = NET_COLORS[ni % NET_COLORS.length];
        const pts = [...new Set(net.nodes)].filter(r => pos[r]).map(r => pos[r]);
        if (pts.length < 2) return;

        ctx.strokeStyle = color + "99";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 3]);
        for (let i = 1; i < pts.length; i++) {
          ctx.beginPath();
          ctx.moveTo(pts[i-1].x, pts[i-1].y);
          // 꺾인 선 (L자형)
          ctx.lineTo(pts[i-1].x, pts[i].y);
          ctx.lineTo(pts[i].x, pts[i].y);
          ctx.stroke();
        }
        ctx.setLineDash([]);

        // 네트 이름 표시 (첫 번째 노드 근처)
        ctx.fillStyle = color;
        ctx.font = "bold 10px monospace";
        ctx.fillText(net.name, pts[0].x + 6, pts[0].y - 8);
      });

      // 컴포넌트 박스
      comps.forEach(comp => {
        const p = pos[comp.ref];
        const x = p.x - CW / 2, y = p.y - CH / 2;

        // 그림자
        ctx.shadowColor = "#7c6af533";
        ctx.shadowBlur = 12;

        // 박스
        ctx.fillStyle = "#1e2135";
        ctx.strokeStyle = getCompColor(comp.ref);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(x, y, CW, CH, 10);
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;

        // 부품 심볼 (아이콘)
        ctx.font = "18px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(getCompIcon(comp.ref), p.x - 30, p.y + 6);

        // ref
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 13px monospace";
        ctx.fillText(comp.ref, p.x + 10, p.y - 6);

        // value
        ctx.fillStyle = "#aaa";
        ctx.font = "11px monospace";
        ctx.fillText(comp.value || "", p.x + 10, p.y + 10);
        ctx.textAlign = "left";
      });

      // 네트 연결 범례
      const legendY = rows * (CH + VGAP) + VGAP + 10;
      ctx.fillStyle = "#555";
      ctx.font = "11px monospace";
      ctx.fillText("NET 연결", HGAP, legendY);

      nets.forEach((net, ni) => {
        const color = NET_COLORS[ni % NET_COLORS.length];
        const ly = legendY + 20 + ni * 24;
        ctx.fillStyle = color;
        ctx.fillRect(HGAP, ly - 4, 20, 3);
        ctx.fillStyle = "#ccc";
        ctx.font = "12px monospace";
        ctx.fillText(`${net.name}`, HGAP + 28, ly);
        ctx.fillStyle = "#666";
        ctx.font = "11px monospace";
        ctx.fillText(`→ ${[...new Set(net.nodes)].join(", ")}`, HGAP + 28 + ctx.measureText(net.name + "  ").width, ly);
      });
    }

    function getCompColor(ref) {
      const t = ref[0].toUpperCase();
      const map = { R:"#f5c26a", C:"#7ab8f5", Q:"#5adf8a", L:"#c47af5", D:"#f57a7a", U:"#7c6af5" };
      return map[t] || "#888";
    }

    function getCompIcon(ref) {
      const t = ref[0].toUpperCase();
      const map = { R:"⊟", C:"⊤", Q:"▷", L:"⊗", D:"▶", U:"▣" };
      return map[t] || "◈";
    }

    function showStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = `status ${type}`;
      el.classList.remove("hidden");
    }
  </script>
</body>
</html>
